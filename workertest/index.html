<!DOCTYPE html>
<html>
<head>
    <title>CineArena - Secure Streaming</title>
</head>
<body>
    <div id="content">Loading...</div>

    <script>
        // YOUR WORKER URL
        const WORKER_URL = "https://cinearena-fun.asifbr444.workers.dev";
        
        // YOUR SECRET KEY (same as in Worker)
        const SECRET_KEY = "x7K9mP2qR5tY8uV3wX6zA1bC4dF7gH9jK2";
        
        async function getSecureData() {
            try {
                // Method 1: Send key in header (MOST SECURE)
                const response = await fetch(WORKER_URL, {
                    headers: {
                        'X-API-Key': SECRET_KEY
                    }
                });
                
                // OR Method 2: Send key in URL (easier but visible)
                // const response = await fetch(`${WORKER_URL}?key=${SECRET_KEY}`);
                
                if (!response.ok) {
                    throw new Error('Access denied');
                }
                
                const data = await response.json();
                
                // Display iframes
                let html = '';
                data.iframes.forEach(source => {
                    html += `
                        <div style="margin-bottom: 20px;">
                            <h2>${source.name}</h2>
                            <iframe src="${source.iframeSrc}" 
                                    width="100%" 
                                    height="500" 
                                    allowfullscreen>
                            </iframe>
                        </div>
                    `;
                });
                
                document.getElementById('content').innerHTML = html;
                
            } catch(error) {
                document.getElementById('content').innerHTML = 
                    '<p style="color:red">Error loading content. Please try again.</p>';
                console.error(error);
            }
        }
        
        // Load when page ready
        getSecureData();
    </script>
</body>
</html>
