<!DOCTYPE html>
<html>
<head>
    <title>CineArena</title>
</head>
<body>
    <div id="container">Loading...</div>

    <script>
        const WORKER_URL = "https://cinearena-fun.asifbr444.workers.dev";
        const SECRET_KEY = "abc123xyz";
        
        async function loadIframes() {
            try {
                // The key is in URL, domain is automatically sent by browser
                const response = await fetch(`${WORKER_URL}?key=${SECRET_KEY}`);
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                // Display iframes
                let html = '';
                data.iframes.forEach(source => {
                    html += `
                        <div style="margin-bottom: 20px;">
                            <h2>${source.name}</h2>
                            <iframe 
                                src="${source.iframeSrc}" 
                                width="100%" 
                                height="500"
                                allowfullscreen>
                            </iframe>
                        </div>
                    `;
                });
                
                document.getElementById('container').innerHTML = html;
                
            } catch(error) {
                document.getElementById('container').innerHTML = 
                    `<p style="color:red">Error: ${error.message}</p>`;
                console.error(error);
            }
        }
        
        loadIframes();
    </script>
</body>
</html>
