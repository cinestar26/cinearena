<!DOCTYPE html>
<html>
<head>
    <title>Test Worker</title>
</head>
<body>
    <h1>Testing Worker Connection</h1>
    <div id="result">Loading...</div>
    
    <script>
        // CHANGE THESE
        const WORKER_URL = "https://cinearena-fun.asifbr444.workers.dev";
        const SECRET_KEY = "mysecret123";
        
        async function testWorker() {
            try {
                console.log("1. Trying to fetch...");
                console.log("URL:", `${WORKER_URL}?key=${SECRET_KEY}`);
                
                const response = await fetch(`${WORKER_URL}?key=${SECRET_KEY}`);
                
                console.log("2. Response status:", response.status);
                console.log("3. Response ok?", response.ok);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                console.log("4. Data received:", data);
                
                document.getElementById('result').innerHTML = `
                    <p style="color:green">✅ SUCCESS!</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                
            } catch(error) {
                console.error("Error:", error);
                document.getElementById('result').innerHTML = `
                    <p style="color:red">❌ ERROR: ${error.message}</p>
                    <p>Check console (F12) for more details</p>
                `;
            }
        }
        
        testWorker();
    </script>
</body>
</html>
