<!DOCTYPE html PUBLIC "-//WAPFORUM//DTD XHTML Mobile 1.0//EN" "http://www.wapforum.org/DTD/xhtml-mobile10.dtd">
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineArena</title>
    <style>
        :root {
            --telegram: #0088cc;
            --neon-blue: #00f2fe;
            --neon-pink: #fe006f;
            --glass-bg: rgba(15, 20, 35, 0.7);
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #050810;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 10px 5px 5px 5px;
            position: relative;
        }

        .bg-orb-1, .bg-orb-2 {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: orbFloat 10s infinite alternate ease-in-out;
        }

        .bg-orb-1 {
            width: 250px;
            height: 250px;
            background: rgba(0, 242, 254, 0.2);
            top: 5%;
            left: 5%;
        }

        .bg-orb-2 {
            width: 200px;
            height: 200px;
            background: rgba(254, 0, 111, 0.15);
            bottom: 5%;
            right: 5%;
            animation-delay: -5s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 30px) scale(1.1); }
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            text-align: center;
            padding-bottom: 10px;
            position: relative;
            z-index: 10;
        }

        .header {
            padding: 15px 15px 5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(to right, #ffffff, #a0c3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            -webkit-text-fill-color: #ffcc00;
        }

        .content-area {
            padding: 20px 15px;
        }

        .notice-box {
            background: linear-gradient(90deg, rgba(0, 136, 204, 0.1), rgba(0, 242, 254, 0.1));
            color: #00f2fe;
            padding: 6px;
            border-radius: 8px;
            font-size: 11px;
            margin-bottom: 10px;
            border: 1px solid rgba(0, 242, 254, 0.2);
            font-weight: 700;
        }

        .premium-banner-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 145px;
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            position: relative;
            background: #0a1118;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.5);
        }

        .premium-bg-image {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background-image: url('https://via.placeholder.com/400x150?text=IPL+2026');
            background-size: cover;
            background-position: center;
            opacity: 0.6;
        }

        .live-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 3px 6px;
            border-radius: 10px;
            font-size: 8px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .live-dot {
            width: 5px;
            height: 5px;
            background: #ff0033;
            border-radius: 50%;
            animation: pulseRed 1s infinite alternate;
        }

        @keyframes pulseRed {
            0% { box-shadow: 0 0 3px #ff0033; }
            100% { box-shadow: 0 0 8px #ff0033; }
        }

        .premium-content {
            position: relative;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 10px;
        }

        .premium-title {
            color: #ffcc00;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .premium-match {
            color: #ffffff;
            font-size: 17px;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 1);
        }

        .premium-btn {
            background: linear-gradient(90deg, #ff0033, #ff5500);
            color: white;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 3px 10px rgba(255, 0, 51, 0.4);
            border: none;
            animation: btnPulse 2s infinite;
        }

        @keyframes btnPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .tg-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 12px;
            border-radius: 10px;
            text-decoration: none;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .tg-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tg-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #0088cc, #00f2fe);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* WhatsApp icon specific style */
        .tg-icon.whatsapp {
            background: linear-gradient(135deg, #25D366, #128C7E);
        }

        .tg-icon svg {
            width: 14px;
            height: 14px;
            fill: white;
        }

        .tg-name {
            font-weight: 700;
            font-size: 13px;
        }

        .join-badge {
            font-size: 10px;
            font-weight: 800;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            margin: 10px 0;
        }

        .continue-btn {
            display: block;
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 900;
            font-size: 13px;
            text-transform: uppercase;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }

        .continue-btn.bottom-btn {
            margin-bottom: 0;
        }

        .footer {
            margin-top: 10px;
            margin-bottom: 5px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            line-height: 1.5;
            text-align: center;
            font-weight: 600;
        }

        /* SINGLE DOWNLOAD NOW BUTTON AT BOTTOM */
        .download-now-footer {
            margin-top: 15px;
            margin-bottom: 10px;
            text-align: center;
            position: relative;
        }

        .download-now-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #ff0033, #ff5500);
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 20px rgba(255, 0, 51, 0.4);
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
            animation: btnPulse 2s infinite;
        }

        .download-now-btn:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #ff2244, #ff7722);
        }

        /* Close button for download section */
        .close-download-wrapper {
            text-align: right;
            margin-bottom: 5px;
        }

        .close-download {
            background: rgba(255, 0, 51, 0.7);
            color: white;
            border: none;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 9px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-download:hover {
            background: #ff0033;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

    <!-- SINGLE DOWNLOAD NOW BUTTON BELOW FOOTER WITH CLOSE OPTION -->
    <div id="downloadNowSection" class="download-now-footer">
        <div class="close-download-wrapper">
            <button class="close-download" onclick="closeDownloadNow()">✕ Close</button>
        </div>
        <a href="#" class="download-now-btn" onclick="redirectDownload('https://example.com/download/sports-package.zip'); return false;">
            ⬇️ DOWNLOAD NOW ⬇️
        </a>
    </div>

    <script>
        // Function to close/hide the download now button
        function closeDownloadNow() {
            const downloadSection = document.getElementById('downloadNowSection');
            downloadSection.classList.add('hidden');
            // Save preference to localStorage
            localStorage.setItem('downloadNowClosed', 'true');
        }

        // Function to handle redirect for download button
        function redirectDownload(url) {
            window.location.href = url;
        }

        // Check if download section was previously closed
        if (localStorage.getItem('downloadNowClosed') === 'true') {
            const downloadSection = document.getElementById('downloadNowSection');
            if (downloadSection) {
                downloadSection.classList.add('hidden');
            }
        }
    </script>
